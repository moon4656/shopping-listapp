<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a67d8; }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      color: #718096;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .stats {
      font-size: 0.82rem;
      color: #a0aec0;
      margin-left: auto;
      align-self: center;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.15s;
      cursor: default;
    }

    li:hover { background: #f7fafc; }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .check-btn.done {
      background: #48bb78;
      border-color: #48bb78;
    }

    .check-btn.done::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-all;
    }

    .del-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .del-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #cbd5e0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 2px solid #fed7d7;
      color: #e53e3e;
      border-radius: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }
    .clear-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
<div class="container">
  <h1>🛒 쇼핑 리스트</h1>
  <p class="subtitle" id="subtitle">오늘 사야 할 것들을 추가하세요</p>

  <div class="input-row">
    <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="80">
    <button onclick="addItem()">추가</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
    <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
    <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    <span class="stats" id="stats"></span>
  </div>

  <ul id="list"></ul>
  <div class="empty" id="empty" style="display:none">아이템이 없습니다</div>

  <button class="clear-btn" id="clearBtn" onclick="clearDone()">완료된 항목 삭제</button>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('shopping') || '[]');
  let filter = 'all';

  const input = document.getElementById('itemInput');
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  const clearBtn = document.getElementById('clearBtn');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  function save() {
    localStorage.setItem('shopping', JSON.stringify(items));
  }

  function addItem() {
    const text = input.value.trim();
    if (!text) return;
    items.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) item.done = !item.done;
    save();
    render();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearDone() {
    items = items.filter(i => !i.done);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const total = items.length;
    const doneCount = items.filter(i => i.done).length;
    const active = total - doneCount;

    stats.textContent = total ? `${doneCount}/${total} 완료` : '';
    clearBtn.disabled = doneCount === 0;

    const visible = items.filter(i => {
      if (filter === 'active') return !i.done;
      if (filter === 'done') return i.done;
      return true;
    });

    list.innerHTML = '';
    empty.style.display = visible.length === 0 ? 'block' : 'none';

    visible.forEach(item => {
      const li = document.createElement('li');
      if (item.done) li.classList.add('checked');

      const checkBtn = document.createElement('button');
      checkBtn.className = 'check-btn' + (item.done ? ' done' : '');
      checkBtn.title = item.done ? '완료 취소' : '완료 표시';
      checkBtn.onclick = () => toggleItem(item.id);

      const span = document.createElement('span');
      span.className = 'item-text';
      span.textContent = item.text;

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.title = '삭제';
      delBtn.textContent = '✕';
      delBtn.onclick = () => deleteItem(item.id);

      li.appendChild(checkBtn);
      li.appendChild(span);
      li.appendChild(delBtn);
      list.appendChild(li);
    });
  }

  render();
</script>
</body>
</html>
